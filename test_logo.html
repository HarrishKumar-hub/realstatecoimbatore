<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Logo Test 7</title>
    <style>
        body {
            background: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .logo-container {
            background: #fff;
            padding: 50px;
            border-radius: 10px;
            width: 800px;
            display: flex;
            justify-content: center;
        }

        svg {
            border: 1px dashed #ddd;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <!-- SVG Canvas -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="100%" height="100%">
            <!-- Shift the logo shapes down and right to give it room based on coordinates -->
            <g transform="translate(68, 10)">
                <!-- Left Red Roof & Stem (L) -->
                <!-- Connecting lines smoothly -->
                <path d="M 125,10 
                         L -10,65 
                         L -10,210 
                         L 45,190 
                         L 45,105 
                         L 125,70 Z" fill="#b91c22" />

                <!-- Red Center L Swoop -->
                <!-- Sweeping completely underneath to wrap the text -->
                <path d="M 45,190
                         C 45,210 50,230 60,250
                         C 70,270 120,290 180,265 
                         C 230,245 285,215 285,210
                         C 285,210 215,255 150,245
                         C 120,240 100,215 90,170
                         C 90,170 85,130 45,110
                         C 45,110 95,120 75,200
                         C 65,230 50,210 45,190
                         Z" fill="#b91c22" />

                <!-- Right Green Roof & Stem (P part 1) -->
                <path d="M 155,-5 
                         L 205,20 
                         L 205,-20 
                         C 245,-20 245,10 245,40 
                         L 310,75 
                         L 310,123 
                         L 285,108 
                         L 285,225 
                         L 230,195 
                         L 230,80 
                         L 155,40 Z" fill="#6ba712" />

                <!-- Inner Green Stem of P -->
                <!-- Making it exactly match the image reference: flat vertical block, not angled at base! -->
                <path d="M 140,85 
                         L 190,85 
                         L 190,205 
                         C 255,195 265,110 190,95
                         M 190,210 L 190,245 L 145,245 L 145,100 Z" fill="#6ba712" />

                <!-- P Inner Cutout Loop (White) -->
                <path d="M 190,115 C 230,115 230,180 190,180 Z" fill="#fff" />

                <!-- Red Circle Background inside P cutout -->
                <circle cx="205" cy="148" r="30" fill="#b91c22" />
                <circle cx="205" cy="148" r="28" fill="none" stroke="#6ba712" stroke-width="1.5" />
                <circle cx="205" cy="148" r="26" fill="none" stroke="#fff" stroke-width="1" />

                <!-- White S Character -->
                <text x="205" y="163" font-family="'Times New Roman', serif" font-weight="bold" font-size="44"
                    fill="#fff" text-anchor="middle">S</text>
            </g>

            <!-- Large LPS Text beside the logo -->
            <text x="400" y="215" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="165"
                fill="#b91c22" letter-spacing="-2">LPS</text>
        </svg>
    </div>
</body>

</html>
